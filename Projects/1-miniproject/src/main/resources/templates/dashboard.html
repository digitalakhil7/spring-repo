<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-start">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="bg-white border rounded-4 shadow-sm p-4 p-md-5">
                <h1 class="display-6 fw-semibold mb-4">Welcome to Your dashboard</h1>

                <div class="mb-4">
                    <p class="mb-2"><strong>Total Enquiries :</strong> <span th:text="${dashboardInfo.totalEnquiries}">0</span></p>
                    <p class="mb-2"><strong>Open Enquiries :</strong> <span th:text="${dashboardInfo.openEnquiries}">0</span></p>
                    <p class="mb-2"><strong>Enrolled Enquiries :</strong> <span th:text="${dashboardInfo.enrolledEnquiries}">0</span></p>
                    <p class="mb-2"><strong>Lost Enquiries :</strong> <span th:text="${dashboardInfo.lostEnquiries}">0</span></p>
                </div>

                <div class="mb-4">
                    <a th:href="@{/add-enquiry}" class="link-primary me-3">Add New Enquiry</a>
                    <a th:href="@{/view-enquiries}" class="link-primary">View Enquiries</a>
                </div>

                <div class="pt-2">
                    <a th:href="@{/logout}" class="btn btn-danger px-4">Logout</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
