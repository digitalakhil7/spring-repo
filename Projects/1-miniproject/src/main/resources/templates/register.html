<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Here</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-start">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="bg-white border rounded-4 shadow-sm p-4 p-md-5">
                <h1 class="display-6 fw-semibold mb-4">Register Here</h1>

                <div th:if="${successMsg}" class="alert alert-success" role="alert" th:text="${successMsg}"></div>

                <form th:action="@{/register}" th:object="${counsellor}" method="post" class="d-grid gap-3">
                    <div>
                        <label for="counsellorName" class="form-label">Name</label>
                        <input type="text" id="counsellorName" th:field="*{counsellorName}" class="form-control"
                               placeholder="Enter your name" required>
                    </div>

                    <div>
                        <label for="counsellorEmail" class="form-label">Email</label>
                        <input type="email" id="counsellorEmail" th:field="*{counsellorEmail}" class="form-control"
                               placeholder="Enter your email" required>
                    </div>

                    <div>
                        <label for="counsellorPassword" class="form-label">Password</label>
                        <input type="password" id="counsellorPassword" th:field="*{counsellorPassword}" class="form-control"
                               placeholder="Enter your password" required>
                    </div>

                    <div>
                        <label for="counsellorPhNo" class="form-label">Phno</label>
                        <input type="tel" id="counsellorPhNo" th:field="*{counsellorPhNo}" class="form-control"
                               placeholder="Enter your phone number" required>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="btn btn-primary px-4">Register</button>
                    </div>
                </form>

                <div class="mt-4">
                    <a th:href="@{/login}" class="link-primary">Login Here</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
