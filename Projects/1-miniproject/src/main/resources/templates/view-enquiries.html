<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Enquiries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-start">
        <div class="col-12">
            <div class="bg-white border rounded-4 shadow-sm p-4 p-md-5">
                <div class="mb-4">
                    <a th:href="@{/add-enquiry}" class="link-primary">Add New Enquiry</a>
                </div>

                <h1 class="display-6 fw-semibold mb-4">View Enquiries Here</h1>

                <form th:action="@{/view-enquiries}" th:object="${enquiryfilter}" method="post"
                      class="row g-3 align-items-end mb-4">
                    <div class="col-12 col-md-3">
                        <label for="studentClassMode" class="form-label">Class Mode</label>
                        <select id="studentClassMode" th:field="*{studentClassMode}" class="form-select">
                            <option value="">-Select-</option>
                            <option value="Online">Online</option>
                            <option value="Offline">Offline</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-3">
                        <label for="courseId" class="form-label">Course</label>
                        <select id="courseId" th:field="*{courseId}" class="form-select">
                            <option value="">-Select-</option>
                            <option th:each="course : ${courses}"
                                    th:value="${course.courseId}"
                                    th:text="${course.courseName}">
                            </option>
                        </select>
                    </div>

                    <div class="col-12 col-md-3">
                        <label for="enquiryStatus" class="form-label">Status</label>
                        <select id="enquiryStatus" th:field="*{enquiryStatus}" class="form-select">
                            <option value="">-Select-</option>
                            <option value="Open">Open</option>
                            <option value="Enrolled">Enrolled</option>
                            <option value="Lost">Lost</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-3">
                        <button type="submit" class="btn btn-primary px-4">Search</button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Phno</th>
                            <th scope="col">Course Name</th>
                            <th scope="col">Class Mode</th>
                            <th scope="col">Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(enquiries)}">
                            <td colspan="5" class="text-center text-muted">No enquiries found</td>
                        </tr>
                        <tr th:each="enquiry : ${enquiries}">
                            <td th:text="${enquiry.studentName}">John</td>
                            <td th:text="${enquiry.studentPhNo}">1234567890</td>
                            <td th:text="${enquiry.course != null ? enquiry.course.courseName : enquiry.studentCourse}">Java</td>
                            <td th:text="${enquiry.studentClassMode}">Online</td>
                            <td th:text="${enquiry.enquiryStatus}">Open</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
