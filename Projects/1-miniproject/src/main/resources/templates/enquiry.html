<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Enquiry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-start">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="bg-white border rounded-4 shadow-sm p-4 p-md-5">
                <h1 class="display-6 fw-semibold mb-4">Add Enquiry Here</h1>

                <div th:if="${successMsg != null and !#strings.isEmpty(successMsg)}"
                     class="alert alert-success mb-3"
                     role="alert"
                     th:text="${successMsg}"></div>
                <div th:if="${errorMsg != null and !#strings.isEmpty(errorMsg)}"
                     class="alert alert-danger mb-3"
                     role="alert"
                     th:text="${errorMsg}"></div>

                <form th:action="@{/add-enquiry}" th:object="${enquiry}" method="post" class="d-grid gap-3">

                    <div class="row align-items-center">
                        <label class="col-sm-4 col-form-label">Name :</label>
                        <div class="col-sm-8">
                            <input type="text" th:field="*{studentName}" class="form-control"
                                   placeholder="Enter student name" required>
                        </div>
                    </div>

                    <div class="row align-items-center">
                        <label class="col-sm-4 col-form-label">Phno :</label>
                        <div class="col-sm-8">
                            <input type="tel" th:field="*{studentPhNo}" class="form-control"
                                   placeholder="Enter phone number" required>
                        </div>
                    </div>

                    <div class="row align-items-center">
                        <label class="col-sm-4 col-form-label">Class Mode :</label>
                        <div class="col-sm-8">
                            <select th:field="*{studentClassMode}" class="form-select" required>
                                <option value="">-Select-</option>
                                <option value="Online">Online</option>
                                <option value="Offline">Offline</option>
                            </select>
                        </div>
                    </div>

                    <div class="row align-items-center">
                        <label class="col-sm-4 col-form-label">Course :</label>
                        <div class="col-sm-8">
                            <select th:field="*{courseId}" class="form-select" required>
                                <option value="">-Select-</option>
                                <option th:each="course : ${courses}"
                                        th:value="${course.courseId}"
                                        th:text="${course.courseName}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="row align-items-center">
                        <label class="col-sm-4 col-form-label">Status :</label>
                        <div class="col-sm-8">
                            <select th:field="*{enquiryStatus}" class="form-select" required>
                                <option value="">-Select-</option>
                                <option value="Open">Open</option>
                                <option value="Enrolled">Enrolled</option>
                                <option value="Lost">Lost</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="btn btn-primary px-4">Save</button>
                    </div>
                </form>

                <div class="mt-4">
                    <a th:href="@{/view-enquiries}" class="btn btn-secondary px-4">View All Enquiries</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
